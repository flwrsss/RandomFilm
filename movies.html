<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Рандомайзер фильмов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #f0f0f0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: #1c1c1c;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .menu-toggle span {
            width: 24px;
            height: 2px;
            background: white;
            border-radius: 2px;
        }

        .menu-dropdown {
            position: fixed;
            top: 80px;
            left: 20px;
            background: #121212;
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 12px 0;
            min-width: 200px;
            z-index: 999;
            border: 1px solid rgba(255,255,255,0.15);
            transform: translateY(-120%);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }

        .menu-dropdown.open {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .menu-dropdown a {
            display: block;
            padding: 12px 24px;
            color: #f0f0f0;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-dropdown a:hover {
            background: #2c2c2c;
            border-left-color: white;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header {
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #aaaaaa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-left: 50px;
        }

        .hero {
            text-align: center;
            padding: 50px 0 20px;
        }

        .hero h1 {
            font-size: clamp(2rem, 7vw, 3.2rem);
            font-weight: 700;
        }

        .randomizer {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            padding: 30px 24px;
            text-align: center;
            margin: 30px 0;
        }

        .film-detail {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            align-items: flex-start;
            justify-content: center;
            margin-top: 20px;
        }

        .film-poster {
            flex: 0 0 180px;
        }

        .film-poster img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .film-info {
            flex: 1;
            min-width: 200px;
            text-align: left;
        }

        .film-name {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .film-description {
            margin-top: 16px;
            background: rgba(255,255,255,0.03);
            padding: 16px;
            border-radius: 20px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 30px 0 10px;
        }

        .btn {
            background: white;
            color: #0a0a0a;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 48px;
            cursor: pointer;
        }

        .btn-genre {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #666;
            font-size: 0.8rem;
        }

        @media (max-width: 700px) {
            .film-detail {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .film-info {
                text-align: center;
            }
            .film-name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="menu-toggle" id="menuToggle">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="menu-dropdown" id="menuDropdown">
    <a href="index.html">🏠 Главная</a>
    <a href="movies.html">🎬 Рандомайзер фильмов</a>
</div>

<div class="container">
    <div class="header">
        <div class="logo">🎬 Рандомайзер фильмов</div>
    </div>
    <div class="hero">
        <h1>Выбери фильм на вечер</h1>
        <p>Кликни по жанру или нажми «Случайный фильм»</p>
    </div>

    <div class="randomizer">
        <div id="filmResult"></div>
        <div class="btn-group">
            <button class="btn" id="randomFilmBtn">🎲 Случайный фильм</button>
        </div>
        <div class="btn-group" id="genreButtons"></div>
        <p style="font-size:0.8rem; margin-top:20px; color:#666;">⬆️ выбери жанр → получишь фильм только из него</p>
    </div>
</div>

<footer class="footer">
    <p>🎥 База фильмов расширяется. Пишите на почту flower.t4klan@bk.ru, какие фильмы ещё добавить.</p>
</footer>

<script>
    const films = [
        { name: "Побег из Шоушенка", year: 1994, genre: "драма", poster: "https://fantlab.ru/blogfiles/b1701/img/1", description: "Бухгалтер Энди Дюфрейн обвинён в убийстве собственной жены и её любовника. Оказавшись в тюрьме под названием Шоушенк, он сталкивается с жестокостью и беззаконием." },
        { name: "Криминальное чтиво", year: 1994, genre: "криминал", poster: "https://vertex-art.ru/wp-content/uploads/Постеры/06w.jpg", description: "Двое бандитов Винсент Вега и Джулс Винфилд проводят время в философских беседах в перерыве между разборками." },
        { name: "Начало", year: 2010, genre: "фантастика", poster: "https://upload.wikimedia.org/wikipedia/ru/b/bc/Poster_Inception_film_2010.jpg", description: "Кобб — вор, проникающий в сны. Ему предлагают последнее дело, которое может вернуть его к семье." },
        { name: "Матрица", year: 1999, genre: "фантастика", poster: "https://avatars.mds.yandex.net/get-kinopoisk-image/1599028/9f8e770b-8d50-42d1-b9b4-bbe58759f29f/orig", description: "Хакер Нео узнаёт, что реальность — это симуляция, и присоединяется к восстанию." },
        { name: "Интерстеллар", year: 2014, genre: "фантастика", poster: "https://ir.ozone.ru/s3/multimedia-p/6173994253.jpg", description: "Земля на грани гибели. Группа астронавтов отправляется через червоточину искать новый дом." },
        { name: "Бойцовский клуб", year: 1999, genre: "драма", poster: "https://avatars.mds.yandex.net/get-kinopoisk-image/1777765/6c5cdb4c-5e28-4552-aac4-beb4efaf718d/180", description: "Офисный работник и мыловар Тайлер Дёрден создают подпольный клуб, где мужчины могут чувствовать себя живыми." },
        { name: "Леон", year: 1994, genre: "боевик", poster: "https://avatars.mds.yandex.net/get-kinopoisk-image/1600647/2dd66cac-5f86-4ceb-aa8c-b107ae26060e/orig", description: "Киллер Леон берёт под опеку девочку Матильду, семью которой убили." },
        { name: "Джокер", year: 2019, genre: "триллер", poster: "https://cdn.ananasposter.ru/image/cache/catalog/poster/film/83/10270-1000x830.jpg", description: "История происхождения Джокера — неудачливого комика Артура Флека, отвергнутого обществом." },
        { name: "Паразиты", year: 2019, genre: "триллер", poster: "https://avatars.mds.yandex.net/get-kinopoisk-image/1900788/9c3920f8-8e8d-476b-b952-d838a9d97cea/576x", description: "Семья бедняков постепенно внедряется в дом богачей, но всё идёт не по плану." },
        { name: "Один дома", year: 1990, genre: "комедия", poster: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQuCwFJP8LzMOcLuKuDffg9GNt5RSYTAJE-Hg&s", description: "Мальчика Кевина случайно оставили одного дома на Рождество, и он ловко противостоит незадачливым ворам." }
    ];

    const genres = [...new Set(films.map(f => f.genre))].sort();
    const resultContainer = document.getElementById('filmResult');
    const randomFilmBtn = document.getElementById('randomFilmBtn');
    const genreContainer = document.getElementById('genreButtons');

    function displayFilm(film) {
        if (!film) {
            resultContainer.innerHTML = `<div style="text-align:center; padding:20px;">😕 Фильм не найден</div>`;
            return;
        }
        resultContainer.innerHTML = `
            <div class="film-detail">
                <div class="film-poster"><img src="${film.poster}" alt="${film.name}" loading="lazy"></div>
                <div class="film-info">
                    <div class="film-name">${film.name}</div>
                    <div class="film-year">📅 ${film.year}</div>
                    <div class="film-genre">🎭 ${film.genre}</div>
                    <div class="film-description">📖 ${film.description}</div>
                </div>
            </div>
        `;
    }

    function getRandomFilm() {
        return films[Math.floor(Math.random() * films.length)];
    }

    function getRandomFilmByGenre(genre) {
        const filtered = films.filter(f => f.genre === genre);
        return filtered.length ? filtered[Math.floor(Math.random() * filtered.length)] : null;
    }

    randomFilmBtn.addEventListener('click', () => displayFilm(getRandomFilm()));

    genres.forEach(genre => {
        const btn = document.createElement('button');
        btn.textContent = `🎬 ${genre}`;
        btn.classList.add('btn', 'btn-genre');
        btn.addEventListener('click', () => displayFilm(getRandomFilmByGenre(genre)));
        genreContainer.appendChild(btn);
    });

    // при загрузке показываем случайный фильм
    displayFilm(getRandomFilm());

    // гамбургер
    const toggle = document.getElementById('menuToggle');
    const dropdown = document.getElementById('menuDropdown');
    toggle.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
        if (!toggle.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove('open');
        }
    });
</script>
</body>
</html>
