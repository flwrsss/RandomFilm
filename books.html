<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Рандомайзер книг</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #f0f0f0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: #1c1c1c;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .menu-toggle span {
            width: 24px;
            height: 2px;
            background: white;
            border-radius: 2px;
        }

        .menu-dropdown {
            position: fixed;
            top: 80px;
            left: 20px;
            background: #121212;
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 12px 0;
            min-width: 200px;
            z-index: 999;
            border: 1px solid rgba(255,255,255,0.15);
            transform: translateY(-120%);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }

        .menu-dropdown.open {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .menu-dropdown a {
            display: block;
            padding: 12px 24px;
            color: #f0f0f0;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-dropdown a:hover {
            background: #2c2c2c;
            border-left-color: white;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header {
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #aaaaaa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-left: 50px;
        }

        .hero {
            text-align: center;
            padding: 50px 0 20px;
        }

        .hero h1 {
            font-size: clamp(2rem, 7vw, 3.2rem);
            font-weight: 700;
        }

        .randomizer {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            padding: 30px 24px;
            text-align: center;
            margin: 30px 0;
        }

        .book-detail {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            align-items: flex-start;
            justify-content: center;
            margin-top: 20px;
        }

        .book-poster {
            flex: 0 0 180px;
        }

        .book-poster img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .book-info {
            flex: 1;
            min-width: 200px;
            text-align: left;
        }

        .book-name {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .book-description {
            margin-top: 16px;
            background: rgba(255,255,255,0.03);
            padding: 16px;
            border-radius: 20px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 30px 0 10px;
        }

        .btn {
            background: white;
            color: #0a0a0a;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 48px;
            cursor: pointer;
        }

        .btn-genre {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #666;
            font-size: 0.8rem;
        }

        @media (max-width: 700px) {
            .book-detail {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .book-info {
                text-align: center;
            }
            .book-name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="menu-toggle" id="menuToggle">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="menu-dropdown" id="menuDropdown">
    <a href="index.html">🏠 Главная</a>
    <a href="movies.html">🎬 Рандомайзер фильмов</a>
    <a href="books.html">📚 Рандомайзер книг</a>
</div>

<div class="container">
    <div class="header">
        <div class="logo">📚 Рандомайзер книг</div>
    </div>
    <div class="hero">
        <h1>Выбери книгу на вечер</h1>
        <p>Кликни по жанру или нажми «Случайная книга»</p>
    </div>

    <div class="randomizer">
        <div id="bookResult"></div>
        <div class="btn-group">
            <button class="btn" id="randomBookBtn">🎲 Случайная книга</button>
        </div>
        <div class="btn-group" id="genreButtons"></div>
        <p style="font-size:0.8rem; margin-top:20px; color:#666;">⬆️ выбери жанр → получишь книгу только из него</p>
    </div>
</div>

<footer class="footer">
    <p>📚 База книг расширяется. Пишите на почту flower.t4klan@bk.ru, какие книги ещё добавить.</p>
</footer>

<script>
    const books = [
        { name: "1984", author: "Джордж Оруэлл", year: 1949, genre: "антиутопия", poster: "https://cv2.litres.ru/pub/c/cover/115248.jpg", description: "Тоталитарное общество, слежка, двумысль — классика антиутопии." },
        { name: "Мастер и Маргарита", author: "Михаил Булгаков", year: 1967, genre: "классика", poster: "https://cv2.litres.ru/pub/c/cover/1562.jpg", description: "Сатира, мистика, любовь и Воланд в Москве 30-х годов." },
        { name: "Гарри Поттер и философский камень", author: "Дж.К. Роулинг", year: 1997, genre: "фэнтези", poster: "https://cv6.litres.ru/pub/c/cover/389822.jpg", description: "Мальчик-волшебник попадает в школу Хогвартс." },
        { name: "Властелин Колец: Братство Кольца", author: "Дж.Р.Р. Толкин", year: 1954, genre: "фэнтези", poster: "https://cv8.litres.ru/pub/c/cover/143749.jpg", description: "Эпическое путешествие, чтобы уничтожить Кольцо Всевластья." },
        { name: "Граф Монте-Кристо", author: "Александр Дюма", year: 1844, genre: "приключения", poster: "https://cv0.litres.ru/pub/c/cover/115299.jpg", description: "Месть и справедливость после несправедливого заключения." },
        { name: "Преступление и наказание", author: "Фёдор Достоевский", year: 1866, genre: "классика", poster: "https://cv8.litres.ru/pub/c/cover/115090.jpg", description: "Теория Раскольникова и её крушение." },
        { name: "451 градус по Фаренгейту", author: "Рэй Брэдбери", year: 1953, genre: "антиутопия", poster: "https://cv1.litres.ru/pub/c/cover/115182.jpg", description: "Мир, где книги сжигают, а пожарные — палачи мысли." }
    ];

    const genres = [...new Set(books.map(b => b.genre))].sort();
    const resultContainer = document.getElementById('bookResult');
    const randomBookBtn = document.getElementById('randomBookBtn');
    const genreContainer = document.getElementById('genreButtons');

    function displayBook(book) {
        if (!book) {
            resultContainer.innerHTML = `<div style="text-align:center; padding:20px;">😕 Книга не найдена</div>`;
            return;
        }
        resultContainer.innerHTML = `
            <div class="book-detail">
                <div class="book-poster"><img src="${book.poster}" alt="${book.name}" loading="lazy"></div>
                <div class="book-info">
                    <div class="book-name">${book.name}</div>
                    <div class="book-year">📅 ${book.year} | ✍️ ${book.author}</div>
                    <div class="book-genre">🎭 ${book.genre}</div>
                    <div class="book-description">📖 ${book.description}</div>
                </div>
            </div>
        `;
    }

    function getRandomBook() {
        return books[Math.floor(Math.random() * books.length)];
    }

    function getRandomBookByGenre(genre) {
        const filtered = books.filter(b => b.genre === genre);
        return filtered.length ? filtered[Math.floor(Math.random() * filtered.length)] : null;
    }

    randomBookBtn.addEventListener('click', () => displayBook(getRandomBook()));

    genres.forEach(genre => {
        const btn = document.createElement('button');
        btn.textContent = `📖 ${genre}`;
        btn.classList.add('btn', 'btn-genre');
        btn.addEventListener('click', () => displayBook(getRandomBookByGenre(genre)));
        genreContainer.appendChild(btn);
    });

    displayBook(getRandomBook());

    const toggle = document.getElementById('menuToggle');
    const dropdown = document.getElementById('menuDropdown');
    toggle.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
        if (!toggle.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove('open');
        }
    });
</script>
</body>
</html>
